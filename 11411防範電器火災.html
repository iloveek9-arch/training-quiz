
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>11411防範電器火災(戊)_含解.pdf</title>
  <style>
    :root { --brand:#0B5AA2; --text:#222; --muted:#6b7280; --ok:#0a7a35; --bad:#b91c1c; }
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans TC', 'PingFang TC', Arial, sans-serif; line-height:1.75; color:var(--text); margin:0; background:#fafafa; }
    header { background:var(--brand); color:#fff; padding:18px 14px; }
    h1 { margin:0; font-size:1.1rem; }
    .container { max-width: 820px; margin: 0 auto; padding:24px 16px; }
    .card { border:1px solid #e5e7eb; border-radius:12px; padding:20px; background:#fff; box-shadow:0 2px 6px rgba(0,0,0,.04); }
    .field { margin: 12px 0; }
    label { display:block; font-weight:600; margin-bottom:6px; }
    input[type=text] { width:100%; padding:10px 12px; border:1px solid #d1d5db; border-radius:8px; font-size:16px; }
    .btn { background:var(--brand); color:#fff; padding:10px 16px; border:none; border-radius:8px; cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; }
    .btn.secondary { background:#475569; }
    .btn[disabled] { background:#9aa6b2; cursor:not-allowed; }
    .muted { color:var(--muted); }
    .qnum { color:#555; font-size:.95rem; }
    .options label { display:block; padding:10px; border-radius:8px; border:1px solid #e5e7eb; margin:10px 0; cursor:pointer; }
    .options input[type=radio] { margin-right:8px; }
    .nav { display:flex; justify-content:space-between; align-items:center; margin-top:16px; }
    .score { font-size: 2.4rem; margin:0; }
    .pass { color:var(--ok); }
    .fail { color:var(--bad); }
  </style>
</head>
<body>
  <header>
    <h1>11411防範電器火災(戊)_含解.pdf</h1>
  </header>

  <main class="container">
    <!-- View: pre-test form -->
    <section id="view-form" class="card" style="display:none;">
      <h2 style="margin-top:0">測驗資料</h2>
      <p class="muted" style="margin-top:-6px">請先輸入單位與姓名再開始測驗。</p>
      <div class="field">
        <label for="unit">單位</label>
        <input type="text" id="unit" placeholder="請輸入單位" autocomplete="organization" />
      </div>
      <div class="field">
        <label for="name">姓名</label>
        <input type="text" id="name" placeholder="請輸入姓名" autocomplete="name" />
      </div>
      <div style="margin-top:12px">
        <button class="btn" id="startBtn">開始測驗</button>
      </div>
    </section>

    <!-- View: question (one per screen) -->
    <section id="view-quiz" class="card" style="display:none;">
      <div class="qnum" id="qnum"></div>
      <h2 id="qtext" style="margin:6px 0 12px;"></h2>
      <div id="qopts" class="options"></div>
      <div class="nav">
        <button class="btn secondary" id="prevBtn">上一題</button>
        <button class="btn" id="nextBtn">下一題</button>
      </div>
    </section>

    <!-- View: results -->
    <section id="view-result" class="card" style="display:none;">
      <h2 style="margin-top:0">測驗結果</h2>
      <p class="muted" id="userInfo"></p>
      <p id="scoreP" class="score"></p>
      <p id="status" style="font-weight:700"></p>
      <div style="margin-top:10px">
        <button class="btn" id="retryBtn">重新作答</button>
      </div>
    </section>
  </main>

<script>
const FILE_TITLE = "11411防範電器火災(戊)_含解.pdf";
// 需改成你發佈後的 Google Apps Script Web App URL（以 https://script.google.com/macros/s/.../exec 開頭）
const SHEETS_ENDPOINT = 'https://script.google.com/macros/s/AKfycbzYhGvCgQzBZY5llVTRwHmn3II5UVzp_1z8305oScJFCFVU7I7ni-tBlG7b4sqMdkEM/exec';
const PASSING_SCORE = 60;
const QUESTIONS = [{"type": "tf", "text": "新增冷氣機可與原有冷氣機共用同一迴路。", "correct": "X"}, {"type": "tf", "text": "住家重新裝潢時，一定要依用電狀況重新配置總用電容量、迴路、插座等，並更新所有電線。", "correct": "O"}, {"type": "tf", "text": "保險絲熔斷，常為用電過量的警告，切勿誤以為保險絲太細而換用較粗之保險絲或以銅絲、鐵絲替代。", "correct": "O"}, {"type": "tf", "text": "神龕燈具長期使用，偶爾檢視配線並清理插頭及插座間的塵埃，並定期更換。", "correct": "X"}, {"type": "tf", "text": "應經常查看插頭是否有綠鏽現象，如有此情形，表示插頭附近溼度高，可能讓兩極通電造成電線短路。", "correct": "O"}, {"type": "tf", "text": "拔下延長線插頭時，應手握電線取下。", "correct": "X"}, {"type": "tf", "text": "電源總開關如經常有跳電情形，應關閉用電量高的電器。", "correct": "O"}, {"type": "tf", "text": "不可用釘子、騎馬釘或訂書針將延長線或電線固定。", "correct": "O"}, {"type": "tf", "text": "對延長線之使用，只要保險開關不會跳脫，可接多條延長線使用。", "correct": "X"}, {"type": "tf", "text": "電線起火應使用 ABC 乾粉滅火器滅火，而電源未切斷前，切勿用水潑覆滅火，以防觸電。", "correct": "O"}, {"type": "mc", "text": "購買家電應注意產品是否有 1.政府檢驗合格標示 2.接地 3.以上皆是 等安全裝置。", "options": ["1.政府檢驗合格標示", "2.接地", "3.以上皆是"], "answer": 3}, {"type": "mc", "text": "用電量較大的電器 1.微波爐 2.烤箱 3.電鍋 4.以上皆是。", "options": ["1.微波爐", "2.烤箱", "3.電鍋", "4.以上皆是"], "answer": 4}, {"type": "mc", "text": "插座有什麼徵兆時應更換新的 1.插座容易鬆動 2.綠繡現象 3.焦黑現象 4.以上皆是。", "options": ["1.插座容易鬆動", "2.綠繡現象", "3.焦黑現象", "4.以上皆是"], "answer": 4}, {"type": "mc", "text": "使用中之延長線如有異常發燙或異味產生，可能為過載現象，應 1.立即停止 2. 堅持到底 使用該電器。", "options": ["1.立即停止", "2.堅持到底"], "answer": 1}, {"type": "mc", "text": "應經常檢視配線並清理 1.插頭 2.插座 3.插頭及插座 間之塵埃，避免結合水份產生積污導電現象與火災發生。", "options": ["1.插頭", "2.插座", "3.插頭及插座"], "answer": 3}, {"type": "mc", "text": "勿將電線及延長線置於 1.有縫隙櫃子下 2.地毯下 3.以上皆是，致電線內部銅線斷裂產生半斷線，造成電流通過過度負載而產生高熱危險。", "options": ["1.有縫隙櫃子下", "2.地毯下", "3.以上皆是"], "answer": 2}, {"type": "mc", "text": "使用中之延長線如有異常發燙或異味產生，可能為 1.本身線體的味道 2.旁有垃圾堆放 3.過載現象，應立即停止使用該電器。", "options": ["1.本身線體的味道", "2.旁有垃圾堆放", "3.過載現象"], "answer": 3}, {"type": "mc", "text": "延長線應在容許負載容量下使用。有關插座是否過載之簡易算法為 1.V=W÷A 2.W=I×V 3.E=mc²。", "options": ["1.V=W÷A", "2.W=I×V", "3.E=mc²"], "answer": 2}, {"type": "mc", "text": "電子鍋耗電功率為 660 瓦特，所需的電流即為 1.3 安培 2.6 安培 3.9 安培。", "options": ["1.3 安培", "2.6 安培", "3.9 安培"], "answer": 2}, {"type": "mc", "text": "電線起火應使用 1.二氧化碳 2.BC 乾粉 3.ABC乾粉 滅火器滅火。", "options": ["1.二氧化碳", "2.BC 乾粉", "3.ABC乾粉"], "answer": 3}];

// LocalStorage keys
const LS_USER = 'elecfire_user';
const LS_ANS = 'elecfire_answers';

function show(id){
  document.querySelectorAll('main section').forEach(s=> s.style.display='none');
  document.getElementById(id).style.display='block';
}

function loadUser(){
  try { return JSON.parse(localStorage.getItem(LS_USER) || '{}'); } catch(e){ return {}; }
}
function saveUser(u){ localStorage.setItem(LS_USER, JSON.stringify(u)); }

function loadAnswers(){ try { return JSON.parse(localStorage.getItem(LS_ANS) || '{}'); } catch(e){ return {}; } }
function saveAnswer(idx, value){
  const a = loadAnswers();
  a[idx] = value; // 1-based index
  localStorage.setItem(LS_ANS, JSON.stringify(a));
}

function initForm(){
  const u = loadUser();
  const unit = document.getElementById('unit');
  const name = document.getElementById('name');
  unit.value = u.unit || '';
  name.value = u.name || '';
  document.getElementById('startBtn').addEventListener('click', ()=>{
    const vUnit = unit.value.trim();
    const vName = name.value.trim();
    if(!vUnit || !vName){
      alert('請完整輸入單位與姓名');
      return;
    }
    saveUser({unit:vUnit, name:vName});
    // 清空上一回作答紀錄
    localStorage.removeItem(LS_ANS);
    startQuiz(1);
  });
}

function renderQuestion(idx){
  const q = QUESTIONS[idx-1];
  document.getElementById('qnum').textContent = `第 ${idx} / ${QUESTIONS.length} 題`;
  document.getElementById('qtext').textContent = q.text;
  const wrap = document.getElementById('qopts');
  const a = loadAnswers()[idx] || '';
  if(q.type==='tf'){
    wrap.innerHTML = `
      <label><input type="radio" name="opt" value="O" ${a==='O'?'checked':''}/> ( ) 正確</label>
      <label><input type="radio" name="opt" value="X" ${a==='X'?'checked':''}/> ( ) 錯誤</label>
    `;
  }else{
    wrap.innerHTML = q.options.map((opt, i)=>{
      const v = String(i+1);
      return `<label><input type="radio" name="opt" value="${v}" ${a===v?'checked':''}/> ${opt}</label>`;
    }).join('');
  }
  document.querySelectorAll('input[name="opt"]').forEach(r=> r.addEventListener('change', e=> saveAnswer(idx, e.target.value)));

  // prev/next buttons
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  prevBtn.disabled = idx===1;
  nextBtn.textContent = (idx===QUESTIONS.length)? '提交交卷' : '下一題';
  prevBtn.onclick = ()=> startQuiz(idx-1);
  nextBtn.onclick = ()=>{
    const checked = document.querySelector('input[name="opt"]:checked');
    if(!checked){ alert('請先選擇一個選項'); return; }
    saveAnswer(idx, checked.value);
    if(idx===QUESTIONS.length){
      // finish
      computeAndShowResult();
    }else{
      startQuiz(idx+1);
    }
  };
}

function startQuiz(startIdx){
  show('view-quiz');
  renderQuestion(startIdx);
}

function formatLocalTs(){
  try{
    return new Date().toLocaleString('zh-TW', { hour12:false, timeZone: 'Asia/Taipei' });
  }catch(e){
    // fallback
    const d = new Date();
    const p = (n)=> String(n).padStart(2,'0');
    return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
  }
}

function displayTitleFrom(full){
  let t = String(full).replace(/\.(pdf|PDF|html)$/,'');
  // 移除括號內註記與其後綴，例如 (戊)_含解
  t = t.replace(/[（(].*?[）)]/g,'');
  t = t.replace(/[_-].*$/,'');
  return t.trim();
}

function sendToSheets(payload){
  try{
    if(!SHEETS_ENDPOINT || SHEETS_ENDPOINT.includes('PASTE_WEB_APP_URL')) return;
    const params = new URLSearchParams(payload);
    // 使用 x-www-form-urlencoded 避免 CORS preflight
    fetch(SHEETS_ENDPOINT, { method:'POST', body: params });
  }catch(err){ console.error(err); }
}

function computeAndShowResult(){
  const answers = loadAnswers();
  let correctCount = 0;
  QUESTIONS.forEach((q, i)=>{
    const idx = i+1;
    const a = answers[idx];
    if(q.type==='tf'){
      if(a===q.correct) correctCount++;
    }else{
      if(String(a)===String(q.answer)) correctCount++;
    }
  });
  const score = Math.round(correctCount / QUESTIONS.length * 100);
  const pass = score >= PASSING_SCORE;
  // render result
  show('view-result');
  const u = loadUser();
  document.getElementById('userInfo').textContent = `${u.unit || ''}／${u.name || ''}`;
  document.getElementById('scoreP').textContent = `${score} 分`;
  const status = document.getElementById('status');
  status.textContent = pass ? '恭喜！及格' : '未達 60 分，請再接再厲';
  status.className = pass ? 'pass' : 'fail';

  // send to Google Sheets
  const ts = formatLocalTs();
  const item = displayTitleFrom(FILE_TITLE);
  const payload = {
    timestamp: ts,
    item: item,
    unit: u.unit || '',
    name: u.name || '',
    score: String(score),
    pass: pass ? '及格' : '不及格'
  };
  sendToSheets(payload);
}

function boot(){
  // route: if no user, show form; else continue last state or start
  const u = loadUser();
  if(!u.unit || !u.name){
    show('view-form');
    initForm();
    return;
  }
  // If there is no answer yet, show form to confirm/allow re-entry
  show('view-form');
  initForm();
}

// Retry
window.addEventListener('DOMContentLoaded', ()=>{
  boot();
  document.getElementById('retryBtn').addEventListener('click', ()=>{
    localStorage.removeItem(LS_ANS);
    startQuiz(1);
  });
});
</script>
</body>
</html>
