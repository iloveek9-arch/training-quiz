
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>安橋教育訓練測驗首頁</title>
  <style>
    :root { --brand:#0B5AA2; --text:#222; --muted:#6b7280; }
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans TC', 'PingFang TC', Arial, sans-serif; line-height:1.75; color:var(--text); margin:0; background:#fafafa; }
    header { background:var(--brand); color:#fff; padding:20px 16px; }
    h1 { margin:0; font-size:1.25rem; }
    main { max-width: 920px; margin: 0 auto; padding:24px 16px; }
    .desc { color: var(--muted); margin-top: 6px; }
    .grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap:16px; margin-top:16px; }
    .card { background:#fff; border:1px solid #e5e7eb; border-radius:12px; padding:16px; box-shadow:0 2px 6px rgba(0,0,0,.04); display:flex; flex-direction:column; justify-content:space-between; }
    .title { font-weight:700; margin:0 0 8px; }
    .meta { color:var(--muted); font-size:.92rem; }
    .btn { margin-top:12px; display:inline-block; background:var(--brand); color:#fff; padding:10px 14px; border-radius:8px; text-decoration:none; }
    footer { color:var(--muted); font-size:.9rem; margin-top:20px; }
  </style>
</head>
<body>
  <header>
    <h1>安橋教育訓練測驗首頁</h1>
    <div class="desc">請選擇要進入的測驗題目（依日期由近到遠排列）。</div>
  </header>
  <main>
    <section class="grid">
      <!-- Newest (11412) first -->
      <article class="card">
        <div>
          <h2 class="title">11412滅火器介紹及使用操作</h2>
          <div class="meta">日期：114 年 12 月｜測驗檔：11412滅火器介紹及使用操作.html</div>
        </div>
        <a class="btn" href="11412滅火器介紹及使用操作.html">開始測驗</a>

      </article>
    </section>

    <footer>
      Powered by 杜威。
    </footer>

</body>
</html>
